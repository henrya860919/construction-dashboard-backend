# 僅覆寫：啟用 Control API（port 9997），並允許從 Railway 內網（Backend）呼叫
# 其餘設定沿用映像內建預設（WebRTC 8889、RTMP 1935 等）
api: true
apiAddress: ":9997"

# 前端在 Vercel（不同網域），需允許跨域才能用 WebRTC/WHEP 播放
webrtcAllowOrigins: ['*']

# 雲端部署時 mediamtx 需知自己的外網 IP，answer SDP 才會有 ice-ufrag；Railway 對 UDP 不穩可先用 TCP
webrtc:
  iceServers:
    - url: stun:stun.l.google.com:19302
    - url: stun:stun1.l.google.com:19302
  iceTCPMuxAddress: ":8189"

# 允許從非 localhost（如 Backend 容器）呼叫 API；保留預設的 publish/read/playback 使用者
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: metrics
      - action: pprof
